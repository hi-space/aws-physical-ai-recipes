AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GR00T-N1.6 SageMaker 파인튜닝 인프라 스택.
  S3 버킷, IAM 실행 역할, ECR 리포지토리, CodeBuild 프로젝트,
  SSM 파라미터, CloudWatch 로그 그룹을 생성합니다.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  BucketName:
    Type: String
    Description: GR00T 아티팩트 저장용 S3 버킷 이름 (전 세계 고유해야 함)
    AllowedPattern: "[a-z0-9][a-z0-9\\-]{2,61}[a-z0-9]"
    ConstraintDescription: "소문자, 숫자, 하이픈만 허용. 3-63자."

  RoleName:
    Type: String
    Default: GR00TSageMakerRole
    Description: SageMaker 실행 역할 이름

  CodeBuildRoleName:
    Type: String
    Default: GR00TCodeBuildRole
    Description: CodeBuild 서비스 역할 이름

  RepositoryUrl:
    Type: String
    Default: ""
    Description: >
      (선택) CodeBuild 소스용 GitHub/CodeCommit 리포지토리 URL.
      비워두면 NoSource 타입으로 생성됩니다 (로컬 zip 업로드 사용).

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasRepositoryUrl: !Not [!Equals [!Ref RepositoryUrl, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # S3 Bucket: 모델, 데이터셋, 학습 출력, 체크포인트 저장
  # ---------------------------------------------------------------------------
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - StorageClass: GLACIER
                TransitionInDays: 90
            NoncurrentVersionExpirationInDays: 365
          - Id: CleanupCheckpoints
            Status: Enabled
            Prefix: checkpoints/
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: GR00T-N1.6

  # ---------------------------------------------------------------------------
  # IAM Role: SageMaker 실행 역할 (최소 권한)
  # ---------------------------------------------------------------------------
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: GR00TS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3BucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"
        - PolicyName: GR00TSSMAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SSMParamRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/groot/*"
        - PolicyName: GR00TECRAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECRPull
                Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:GetAuthorizationToken
                Resource: "*"
      Tags:
        - Key: Project
          Value: GR00T-N1.6

  # ---------------------------------------------------------------------------
  # ECR Repositories: 학습 / 추론 컨테이너 이미지
  # ---------------------------------------------------------------------------
  TrainingRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: groot-n16-training
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "최근 5개 이미지만 유지",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: GR00T-N1.6

  InferenceRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: groot-n16-inference
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "최근 5개 이미지만 유지",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: GR00T-N1.6

  # ---------------------------------------------------------------------------
  # IAM Role: CodeBuild 서비스 역할
  # ---------------------------------------------------------------------------
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref CodeBuildRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildECRAndLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: "*"
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/groot-n16-*"
              - Sid: S3ForBuildSource
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}/codebuild-source/*"

  # ---------------------------------------------------------------------------
  # CodeBuild Projects: Docker 이미지 빌드 및 ECR 푸시
  # ---------------------------------------------------------------------------
  TrainingBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: groot-n16-training-build
      Description: GR00T-N1.6 학습 컨테이너 빌드 및 ECR 푸시
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true         # Docker in Docker 빌드 허용
        EnvironmentVariables:
          - Name: ECR_REGISTRY
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com"
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: !If [HasRepositoryUrl, GITHUB, NO_SOURCE]
        Location: !If [HasRepositoryUrl, !Ref RepositoryUrl, !Ref AWS::NoValue]
        BuildSpec: !If
          - HasRepositoryUrl
          - container/training/buildspec.yml
          - |
            version: 0.2
            phases:
              build:
                commands:
                  - echo "소스 없음: S3에서 소스를 업로드한 후 빌드를 트리거하세요."
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/aws/codebuild/groot-n16-training-build"
      Tags:
        - Key: Project
          Value: GR00T-N1.6

  InferenceBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: groot-n16-inference-build
      Description: GR00T-N1.6 추론 컨테이너 빌드 및 ECR 푸시
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REGISTRY
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com"
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: !If [HasRepositoryUrl, GITHUB, NO_SOURCE]
        Location: !If [HasRepositoryUrl, !Ref RepositoryUrl, !Ref AWS::NoValue]
        BuildSpec: !If
          - HasRepositoryUrl
          - container/inference/buildspec.yml
          - |
            version: 0.2
            phases:
              build:
                commands:
                  - echo "소스 없음: S3에서 소스를 업로드한 후 빌드를 트리거하세요."
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/aws/codebuild/groot-n16-inference-build"
      Tags:
        - Key: Project
          Value: GR00T-N1.6

  # ---------------------------------------------------------------------------
  # SSM Parameters: 민감 정보 저장 (선택)
  # ---------------------------------------------------------------------------
  HuggingFaceTokenParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /groot/hf-token
      Type: String
      Value: "PLACEHOLDER_REPLACE_WITH_YOUR_HF_TOKEN"
      Description: HuggingFace API 토큰 (GR00T 모델 다운로드용)
      Tags:
        Project: GR00T-N1.6

  WandbApiKeyParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /groot/wandb-key
      Type: String
      Value: "PLACEHOLDER_REPLACE_WITH_YOUR_WANDB_KEY"
      Description: Weights & Biases API 키 (학습 추적용, 선택)
      Tags:
        Project: GR00T-N1.6

  # ---------------------------------------------------------------------------
  # CloudWatch Log Group: SageMaker 학습 로그
  # ---------------------------------------------------------------------------
  SageMakerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/sagemaker/groot-n16
      RetentionInDays: 30

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  BucketName:
    Description: S3 버킷 이름
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  SageMakerRoleArn:
    Description: SageMaker 실행 역할 ARN
    Value: !GetAtt SageMakerExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SageMakerRoleArn"

  TrainingRepositoryUri:
    Description: 학습 컨테이너 ECR URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${TrainingRepository}"
    Export:
      Name: !Sub "${AWS::StackName}-TrainingRepositoryUri"

  InferenceRepositoryUri:
    Description: 추론 컨테이너 ECR URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${InferenceRepository}"
    Export:
      Name: !Sub "${AWS::StackName}-InferenceRepositoryUri"

  TrainingBuildProjectName:
    Description: 학습 컨테이너 CodeBuild 프로젝트 이름
    Value: !Ref TrainingBuildProject

  InferenceBuildProjectName:
    Description: 추론 컨테이너 CodeBuild 프로젝트 이름
    Value: !Ref InferenceBuildProject
